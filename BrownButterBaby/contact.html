      rel="stylesheet"
    />
    <title>Contact - Brown Butter Baby</title>
  </head>
  <body>
    <header id="home">
      <div class="header-wrapper">
        <h1 id="header-title">Baked with Love, Made for You</h1>
        <p class="header-intro">
          Homemade bake goods. From our kitchen to yours.
        </p>
        <img
          class="img-logo"
          src="images/brownbutterbabylogo.jpg"
          alt="Brown Butter Baby logo"
        />
        <nav>
          <ul>
              <li><a href="index.html">Home</a></li>
              <li><a href="menu.html">Menu</a></li>
              <li><a href="order.html">Order</a></li>
              <li><a href="about.html">About</a></li>
            <li><a href="contact.html">Contact</a></li>
          </ul>
        </nav>
      </div>
    </header>
    <!-- CONTACT US -->
    <main class="contact-page">
      <div class="contact-header">
        <h1 class="contact-text">Contact Us</h1>
      </div>
      <div class="contact-form">
        <form action="#" method="post">
          <p>
            <label for="first-name">First Name:</label>
            <input type="text" name="first-name" id="first-name" />
          </p>
          <p>
            <label for="last-name">Last Name:</label>
            <input type="text" name="last-name" id="last-name" />
          </p>
          <p>
            <label for="email">Email:</label>
            <input type="email" name="user-email" id="email" />
          </p>
          <p>
            <label for="msg">Message Us:</label>
            <textarea name="user-message" id="msg"></textarea>
          </p>
          <button class="submit-btn" type="submit">Submit</button>
        </form>
      </div>
      
    </main>
    <footer>
        <div class="footer-bar">
            &copy; 2026 Brown Butter Baby. All rights reserved.
        </div>
      </footer>
  </body>
